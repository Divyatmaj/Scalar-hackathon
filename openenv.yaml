name: ai-interview-prep-rl-env
description: Reinforcement Learning environment for AI-powered technical interview preparation with keyword-based evaluation and retry mechanism

endpoints:
  reset:
    method: POST
    path: /reset
    description: Reset environment and get new interview question
    response_schema:
      type: object
      properties:
        question:
          type: string
          description: Interview question text
        difficulty:
          type: string
          description: Question difficulty level (easy, medium, hard)
        attempt:
          type: integer
          description: Current attempt number (0 after reset)
      required:
        - question
        - difficulty
        - attempt
  
  step:
    method: POST
    path: /step
    description: Submit answer and get evaluation with reward
    request_schema:
      type: object
      properties:
        action:
          type: string
          description: Candidate's answer to the question
      required:
        - action
    response_schema:
      type: object
      properties:
        reward:
          type: number
          description: Reward signal between 0.1 and 0.9
          minimum: 0.1
          maximum: 0.9
        done:
          type: boolean
          description: Whether episode is complete
        state:
          type: object
          properties:
            question:
              type: string
            difficulty:
              type: string
            attempt:
              type: integer
          required:
            - question
            - difficulty
            - attempt
      required:
        - reward
        - done
        - state
  
  state:
    method: GET
    path: /state
    description: Get current environment state
    response_schema:
      type: object
      properties:
        question:
          type: string
          description: Current interview question
        difficulty:
          type: string
          description: Question difficulty level
        attempt:
          type: integer
          description: Current attempt number
      required:
        - question
        - difficulty
        - attempt

tasks:
  count: 12
  source: backend/app/dataset.json
  description: Technical interview questions covering algorithms, systems, databases, and software design

grading:
  type: hybrid
  deterministic: true
  components:
    - keyword_matching: 0.8
    - length_scoring: 0.2
  output_range:
    min: 0.1
    max: 0.9

environment:
  type: single_question_episode
  max_retries: 3
  state_representation:
    - question: string
    - difficulty: string
    - attempt: integer
  action_space: text
  reward_range: [0.1, 0.9]
